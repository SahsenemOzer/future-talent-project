<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Portfolio Builder</title>
  <meta name="description" content="Basit QR tabanli portfolio olusturucu.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      background: #0b1120;
    }
    .glass {
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(148, 163, 184, 0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dropzone {
      border: 1px dashed rgba(148, 163, 184, 0.55);
    }
    .dropzone.dragover {
      border-color: #60a5fa;
      background: rgba(30, 41, 59, 0.7);
    }
  </style>
</head>
<body class="text-slate-100 antialiased">
  <main class="mx-auto w-full max-w-5xl px-4 py-10 md:px-8">
    <section id="builder-view" class="glass rounded-2xl p-6">
      <h1 class="text-2xl font-bold">Basit QR Portfolio Builder</h1>
      <p class="mt-2 text-sm text-slate-300">Bilgileri gir, olustur; ekran sadece portfolyoya gecsin. QR ile acan kisi de sadece portfolyo gorur.</p>
      <form id="builder-form" class="mt-5 grid gap-3 md:grid-cols-2">
        <input id="base-url-input" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2 md:col-span-2" placeholder="Canli site adresi (opsiyonel): https://kullanici.github.io/proje/">
        <input id="name-input" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2" placeholder="Ad Soyad" value="Sahsen Emre Ozer">
        <input id="title-input" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2" placeholder="Unvan" value="Junior AI Developer / University Student">
        <input id="photo-input" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2 md:col-span-2" placeholder="Profil Foto URL (opsiyonel)">
        <div id="dropzone" class="dropzone rounded-lg bg-slate-900/60 px-3 py-4 text-sm text-slate-300 md:col-span-2">
          Fotografi buraya surukle-birak veya
          <label for="photo-file" class="cursor-pointer text-blue-400 underline">dosya sec</label>
          <input id="photo-file" type="file" accept="image/*" class="hidden">
          <p class="mt-1 text-xs text-slate-400">Yuklenen fotograf dogrudan portfolyoya yerlesir.</p>
        </div>
        <textarea id="education-input" rows="3" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2 md:col-span-2" placeholder="Egitim her satir: Okul|Bolum|Yil">Universite Adi|Bilgisayar Muhendisligi|2023 - Devam</textarea>
        <textarea id="skills-input" rows="6" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2 md:col-span-2" placeholder="Yetenekleri her satira bir tane yaz&#10;Ornek: Python&#10;Prompt Engineering&#10;UI Design">Python
Prompt Engineering
UI Design</textarea>
        <textarea id="projects-input" rows="4" class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2 md:col-span-2" placeholder="Projeler her satir: Proje|Kisa aciklama">AI Voice-Over Guide|QR tabanli sesli rehber deneyimi
Smart Campus Assistant|AI destekli kampus asistani prototipi</textarea>
        <div class="md:col-span-2 flex flex-wrap gap-3">
          <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 font-semibold">Portfolyo + QR Olustur</button>
          <button id="copy-link-btn" type="button" class="rounded-lg border border-slate-600 px-4 py-2">Linki Kopyala</button>
          <a id="share-link" href="#" class="self-center text-sm text-emerald-400 underline">Link hazir degil</a>
        </div>
      </form>
      <div class="mt-4 flex items-center gap-4">
        <div id="qr-preview" class="hidden rounded-lg bg-white p-2"></div>
        <p id="builder-status" class="text-sm text-slate-300">Hazir.</p>
      </div>
    </section>

    <section id="portfolio-view" class="hidden">
      <div class="mb-4 flex items-center justify-between">
        <button id="edit-btn" class="rounded-lg border border-slate-600 px-3 py-2 text-sm">Duzenlemeye Don</button>
      </div>
      <div class="glass rounded-2xl p-6">
        <div class="flex items-center gap-4">
          <img id="hero-photo" src="" alt="Profil" class="h-20 w-20 rounded-xl object-cover bg-slate-800">
          <div>
            <h2 id="hero-name" class="text-2xl font-bold"></h2>
            <p id="hero-title" class="text-slate-300"></p>
          </div>
        </div>
        <h3 class="mt-6 text-lg font-semibold text-blue-400">Yetenekler</h3>
        <ul id="skills-list" class="mt-3 grid gap-2 md:grid-cols-2"></ul>
        <h3 class="mt-6 text-lg font-semibold text-violet-400">Egitim</h3>
        <div id="education-list" class="mt-3 grid gap-3"></div>
        <h3 class="mt-6 text-lg font-semibold text-emerald-400">Projeler</h3>
        <div id="projects-list" class="mt-3 grid gap-3 md:grid-cols-2"></div>
      </div>
    </section>
  </main>

  <script>
    const builderView = document.getElementById("builder-view");
    const portfolioView = document.getElementById("portfolio-view");
    const builderForm = document.getElementById("builder-form");
    const builderStatus = document.getElementById("builder-status");
    const copyLinkBtn = document.getElementById("copy-link-btn");
    const shareLink = document.getElementById("share-link");
    const qrPreview = document.getElementById("qr-preview");
    const photoFileInput = document.getElementById("photo-file");
    const dropzone = document.getElementById("dropzone");
    const editBtn = document.getElementById("edit-btn");
    const heroName = document.getElementById("hero-name");
    const heroTitle = document.getElementById("hero-title");
    const heroPhoto = document.getElementById("hero-photo");
    const skillsList = document.getElementById("skills-list");
    const educationList = document.getElementById("education-list");
    const projectsList = document.getElementById("projects-list");
    let uploadedPhotoDataUrl = "";

    const defaultData = {
      name: "Sahsen Emre Ozer",
      title: "Junior AI Developer / University Student",
      photo: "",
      education: [
        { school: "Universite Adi", dept: "Bilgisayar Muhendisligi", year: "2023 - Devam" }
      ],
      skills: ["Python", "Prompt Engineering", "UI Design"],
      projects: [
        { title: "AI Voice-Over Guide", desc: "QR tabanli sesli rehber deneyimi" },
        { title: "Smart Campus Assistant", desc: "AI destekli kampus asistani prototipi" }
      ]
    };

    function parseSkills(raw) {
      return raw
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .slice(0, 20);
    }

    function parseProjects(raw) {
      return raw
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const [title, desc] = line.split("|").map((v) => (v || "").trim());
          return { title, desc };
        })
        .filter((item) => item.title && item.desc)
        .slice(0, 6);
    }

    function parseEducation(raw) {
      return raw
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const [school, dept, year] = line.split("|").map((v) => (v || "").trim());
          return { school, dept, year };
        })
        .filter((item) => item.school && item.dept && item.year)
        .slice(0, 6);
    }

    function short(text, max) {
      return String(text || "").trim().slice(0, max);
    }

    function sanitizeForQr(text, max) {
      return short(text, max)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9 .,_\-]/g, "");
    }

    function buildDataFromForm() {
      const name = sanitizeForQr(document.getElementById("name-input").value, 40);
      const title = sanitizeForQr(document.getElementById("title-input").value, 50);
      const photo = uploadedPhotoDataUrl || document.getElementById("photo-input").value.trim();
      const education = parseEducation(document.getElementById("education-input").value).slice(0, 3);
      const skills = parseSkills(document.getElementById("skills-input").value).slice(0, 6).map((s) => sanitizeForQr(s, 20));
      const projects = parseProjects(document.getElementById("projects-input").value)
        .slice(0, 2)
        .map((p) => ({ title: sanitizeForQr(p.title, 26), desc: sanitizeForQr(p.desc, 40) }));
      return { name, title, photo, education, skills, projects };
    }

    function renderPortfolio(data) {
      heroName.textContent = data.name || defaultData.name;
      heroTitle.textContent = data.title || defaultData.title;
      heroPhoto.src = data.photo || "https://placehold.co/120x120/0f172a/e2e8f0?text=PP";

      const skills = data.skills.length ? data.skills : defaultData.skills;
      skillsList.innerHTML = skills
        .map((skill) => `<li class="rounded-lg border border-slate-700 bg-slate-900/60 px-3 py-2">${skill}</li>`)
        .join("");

      const education = data.education && data.education.length ? data.education : defaultData.education;
      educationList.innerHTML = education
        .map((item) => `<article class="rounded-lg border border-slate-700 bg-slate-900/60 p-3"><h4 class="font-semibold text-violet-300">${item.school}</h4><p class="text-sm text-slate-300">${item.dept}</p><p class="text-xs text-slate-400">${item.year}</p></article>`)
        .join("");

      const projects = data.projects.length ? data.projects : defaultData.projects;
      projectsList.innerHTML = projects
        .map((project) => `<article class="rounded-lg border border-slate-700 bg-slate-900/60 p-3"><h4 class="font-semibold text-blue-300">${project.title}</h4><p class="mt-1 text-sm text-slate-300">${project.desc}</p></article>`)
        .join("");
    }

    function buildShareLink(data) {
      const baseInput = document.getElementById("base-url-input").value.trim();
      const currentIsWeb = /^https?:$/i.test(window.location.protocol);
      let base = "";
      if (currentIsWeb) {
        base = `${window.location.origin}${window.location.pathname}`;
      } else if (/^https?:\/\//i.test(baseInput)) {
        base = baseInput;
      } else {
        builderStatus.textContent = "QR icin gecerli bir web adresi gerekli. Once projeyi GitHub Pages/Vercel'de yayinla veya yukaridaki alana canli URL gir.";
        throw new Error("Invalid base URL for QR");
      }

      const params = new URLSearchParams();
      params.set("view", "portfolio");
      params.set("n", data.name || defaultData.name);
      params.set("t", data.title || defaultData.title);

      const safePhoto = data.photo && !data.photo.startsWith("data:") ? data.photo : "";
      if (safePhoto) params.set("p", safePhoto);

      const skillsCompact = (data.skills || []).join("~");
      if (skillsCompact) params.set("s", skillsCompact);

      const eduCompact = (data.education || [])
        .map((e) => `${e.school}^${e.dept}^${e.year}`)
        .join("~");
      if (eduCompact) params.set("e", eduCompact);

      const projectsCompact = (data.projects || [])
        .map((p) => `${p.title}^${p.desc}`)
        .join("~");
      if (projectsCompact) params.set("pr", projectsCompact);

      const url = `${base}?${params.toString()}`;
      if (url.length > 700) {
        builderStatus.textContent = "QR verisi cok uzun. Yetenek/proje metinlerini kisalt.";
        throw new Error("QR payload too long");
      }
      shareLink.href = url;
      shareLink.textContent = "Paylasim linkini ac";
      renderQrCode(url);
      return url;
    }

    function renderQrCode(text) {
      qrPreview.innerHTML = "";
      if (typeof QRCode === "undefined") {
        builderStatus.textContent = "QR kutuphanesi yuklenemedi. Linki kullanarak devam edebilirsin.";
        qrPreview.classList.add("hidden");
        return;
      }

      new QRCode(qrPreview, {
        text,
        width: 180,
        height: 180,
        colorDark: "#0f172a",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.L
      });
      qrPreview.classList.remove("hidden");
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("view") !== "portfolio") return null;

      const data = {
        name: params.get("n") || defaultData.name,
        title: params.get("t") || defaultData.title,
        photo: params.get("p") || "",
        skills: [],
        education: [],
        projects: []
      };

      const skillsRaw = params.get("s");
      if (skillsRaw) data.skills = skillsRaw.split("~").map((v) => v.trim()).filter(Boolean).slice(0, 8);

      const eduRaw = params.get("e");
      if (eduRaw) {
        data.education = eduRaw.split("~")
          .map((line) => {
            const [school, dept, year] = line.split("^");
            return { school: school || "", dept: dept || "", year: year || "" };
          })
          .filter((item) => item.school && item.dept && item.year)
          .slice(0, 3);
      }

      const projectsRaw = params.get("pr");
      if (projectsRaw) {
        data.projects = projectsRaw.split("~")
          .map((line) => {
            const [title, desc] = line.split("^");
            return { title: title || "", desc: desc || "" };
          })
          .filter((item) => item.title && item.desc)
          .slice(0, 3);
      }

      return data;
    }

    builderForm.addEventListener("submit", (event) => {
      event.preventDefault();

      if (!/^https?:/i.test(window.location.protocol)) {
        builderStatus.textContent = "QR'nin telefonda calismasi icin projeyi GitHub Pages/Vercel gibi bir URL uzerinden acmalisin.";
      }

      const data = buildDataFromForm();
      if (!data.skills.length || !data.projects.length) {
        builderStatus.textContent = "En az 1 yetenek ve 1 proje satiri girmen gerekiyor.";
        return;
      }
      if (data.photo.startsWith("data:")) {
        builderStatus.textContent = "Not: Yuklenen dosya fotografi QR linkine konulmaz. QR'da foto icin URL kullan.";
      }
      renderPortfolio(data);
      let url = "";
      try {
        url = buildShareLink(data);
      } catch {
        return;
      }
      builderStatus.textContent = "Hazir. QR sade link ile olusturuldu, cihaz daha kolay okur.";
      window.history.replaceState({}, "", new URL(url).search);
      builderView.classList.add("hidden");
      portfolioView.classList.remove("hidden");
    });

    copyLinkBtn.addEventListener("click", async () => {
      const href = shareLink.href;
      if (!href || href === "#") {
        builderStatus.textContent = "Once Portfolyoyu Uret butonuna bas.";
        return;
      }
      try {
        await navigator.clipboard.writeText(href);
        builderStatus.textContent = "Link panoya kopyalandi.";
      } catch {
        builderStatus.textContent = "Link kopyalanamadi. Linki manuel kopyalayabilirsin.";
      }
    });

    function handlePhotoFile(file) {
      if (!file || !file.type.startsWith("image/")) {
        builderStatus.textContent = "Lutfen gecerli bir gorsel dosyasi sec.";
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        uploadedPhotoDataUrl = String(reader.result || "");
        builderStatus.textContent = "Fotograf yuklendi. Portfolyo olusturdugunda kullanilacak.";
      };
      reader.readAsDataURL(file);
    }

    photoFileInput.addEventListener("change", (event) => {
      handlePhotoFile(event.target.files && event.target.files[0]);
    });

    dropzone.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", (event) => {
      event.preventDefault();
      dropzone.classList.remove("dragover");
      const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
      handlePhotoFile(file);
    });

    editBtn.addEventListener("click", () => {
      portfolioView.classList.add("hidden");
      builderView.classList.remove("hidden");
    });

    const urlData = loadFromUrl();
    const initialData = urlData || defaultData;
    renderPortfolio(initialData);
    if (urlData) {
      buildShareLink(initialData);
      builderView.classList.add("hidden");
      portfolioView.classList.remove("hidden");
    } else {
      builderView.classList.remove("hidden");
      portfolioView.classList.add("hidden");
    }
  </script>
</body>
</html>
